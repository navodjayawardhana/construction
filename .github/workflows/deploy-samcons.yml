name: Deploy to Samantha Constructions (Obfuscated)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Frontend Build ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      # ── Backend Setup ──
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pdo_mysql, dom, gd, zip, bcmath
          coverage: none

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # ── Obfuscate PHP Code ──
      - name: Obfuscate PHP source code
        run: php obfuscate.php

      # ── Restructure for Flat Deployment ──
      - name: Prepare flat structure for subdomain root
        run: |
          # Move public/ contents to project root
          cp -rf public/* ./
          cp -f public/.htaccess ./.htaccess 2>/dev/null || true

          # Fix index.php paths for flat structure
          sed -i "s|__DIR__.'/../vendor|__DIR__.'/vendor|g" index.php
          sed -i "s|__DIR__.'/../bootstrap|__DIR__.'/bootstrap|g" index.php
          sed -i "s|__DIR__.'/../storage|__DIR__.'/storage|g" index.php

          # Fix deploy-migrate.php paths
          sed -i "s|__DIR__ \. '/../|__DIR__ . '/|g" deploy-migrate.php 2>/dev/null || true
          sed -i "s|__DIR__.'/../|__DIR__.'/|g" deploy-migrate.php 2>/dev/null || true

          # Create security .htaccess that blocks sensitive dirs
          cat > .htaccess << 'HTACCESS'
          <IfModule mod_rewrite.c>
              <IfModule mod_negotiation.c>
                  Options -MultiViews -Indexes
              </IfModule>

              RewriteEngine On

              # Handle Authorization Header
              RewriteCond %{HTTP:Authorization} .
              RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

              # Block access to sensitive directories and files
              RewriteRule ^app(/|$) - [F,L]
              RewriteRule ^bootstrap(/|$) - [F,L]
              RewriteRule ^config(/|$) - [F,L]
              RewriteRule ^database(/|$) - [F,L]
              RewriteRule ^routes(/|$) - [F,L]
              RewriteRule ^storage(/|$) - [F,L]
              RewriteRule ^vendor(/|$) - [F,L]
              RewriteRule ^\.env - [F,L]
              RewriteRule ^artisan$ - [F,L]
              RewriteRule ^composer\.(json|lock)$ - [F,L]

              # Redirect Trailing Slashes If Not A Folder
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteCond %{REQUEST_URI} (.+)/$
              RewriteRule ^ %1 [L,R=301]

              # Send Requests To Front Controller
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteRule ^ index.php [L]
          </IfModule>
          HTACCESS

          # Remove public/ directory (already moved)
          rm -rf public/

          # Remove files not needed on server
          rm -f obfuscate.php deploy.php phpunit.xml
          rm -rf tests/ node_modules/ resources/
          rm -f vite.config.js postcss.config.cjs tailwind.config.cjs
          rm -f tsconfig.json tsconfig.node.json package.json package-lock.json

      # ── Deploy via FTP ──
      - name: Deploy to admin.samanthaconstructions.lk
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST_SAMCONS }}
          username: ${{ secrets.FTP_USERNAME_SAMCONS }}
          password: ${{ secrets.FTP_PASSWORD_SAMCONS }}
          local-dir: ./
          server-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/.env.example
            **/.env.backup

      # ── Run Migrations ──
      - name: Run migrations on admin.samanthaconstructions.lk
        run: |
          echo "Waiting for FTP sync to complete..."
          sleep 10
          response=$(curl -s -w "\n%{http_code}" "https://admin.samanthaconstructions.lk/deploy-migrate.php?token=${{ secrets.DEPLOY_TOKEN_SAMCONS }}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" != "200" ]; then
            echo "::warning::Migration returned HTTP $http_code - may need manual install first time"
          fi
